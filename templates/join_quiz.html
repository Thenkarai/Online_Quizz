<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Quiz - QuizPro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body>
    <div class="container" style="max-width: 500px; margin-top: 100px;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0;">Join Competition</h2>
                <a href="{{ url_for('index') }}" class="btn btn-outline"
                    style="padding: 0.25rem 0.75rem; font-size: 0.8rem;">Home</a>
            </div>
            <form method="POST">
                <div class="form-group">
                    <label>Unique Quiz Code</label>
                    <input type="text" name="quiz_code" value="{{ code }}" placeholder="Enter 6-digit code" required
                        style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Register Number (Optional)</label>
                    <input type="text" name="reg_num">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Join Quiz</button>
            </form>
        </div>
    </div>
</body>

</html>
