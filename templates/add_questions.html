<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Questions - QuizPro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body>
    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0;">Add Question to: {{ quiz.title }}</h2>
                <span class="badge"
                    style="background: rgba(67, 56, 202, 0.1); color: var(--primary); font-size: 0.9rem; padding: 0.5rem 1rem;">
                    Added: {{ current_count }} / {{ quiz.num_questions }}
                </span>
            </div>

            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Question Type</label>
                    <select name="question_type" id="q_type" onchange="toggleFields()">
                        <option value="mcq">Multiple Choice (MCQ)</option>
                        <option value="fib">Fill in the Blanks</option>
                        <option value="image">Image Based MCQ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Question Text</label>
                    <textarea name="question_text" required rows="3"></textarea>
                </div>

                <div id="image_upload" class="form-group" style="display: none;">
                    <label>Upload Image</label>
                    <input type="file" name="image_file">
                </div>

                <div id="options_sec">
                    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <input type="text" name="opt1" id="opt1" placeholder="Option 1">
                        <input type="text" name="opt2" id="opt2" placeholder="Option 2">
                        <input type="text" name="opt3" id="opt3" placeholder="Option 3">
                        <input type="text" name="opt4" id="opt4" placeholder="Option 4">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label>Correct Answer</label>
                    <div id="correct_ans_container">
                        <input type="text" name="correct_answer" id="correct_answer_text"
                            placeholder="Enter correct option/text" required>
                        <select name="correct_answer_select" id="correct_answer_select" style="display: none;">
                            <option value="">Select Correct Option</option>
                            <option value="Option 1">Option 1</option>
                            <option value="Option 2">Option 2</option>
                            <option value="Option 3">Option 3</option>
                            <option value="Option 4">Option 4</option>
                        </select>
                    </div>
                    <small id="ans_hint" style="color: var(--text-muted);">For MCQ, select the correct option from the
                        dropdown.</small>
                </div>

                <div class="flex gap-4" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Add Question & Continue</button>
                    {% if current_count >= quiz.num_questions %}
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-success"
                        style="flex: 1; text-align: center; background: var(--success);">Finish Quiz</a>
                    {% else %}
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline"
                        style="flex: 1; text-align: center; color: var(--danger); border-color: rgba(239, 68, 68, 0.2);"
                        onclick="return confirm('You have only added {{ current_count }} of {{ quiz.num_questions }} questions. If you finish early, the quiz will be shorter than planned. Continue?');">Finish
                        Early</a>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleFields() {
            const type = document.getElementById('q_type').value;
            const isMCQ = (type === 'mcq' || type === 'image');

            document.getElementById('image_upload').style.display = (type === 'image') ? 'block' : 'none';
            document.getElementById('options_sec').style.display = isMCQ ? 'block' : 'none';

            // Toggle correct answer input type
            const textInput = document.getElementById('correct_answer_text');
            const selectInput = document.getElementById('correct_answer_select');

            if (isMCQ) {
                textInput.style.display = 'none';
                textInput.required = false;
                selectInput.style.display = 'block';
                selectInput.required = true;
                document.getElementById('ans_hint').innerText = "Select which option is correct.";
            } else {
                textInput.style.display = 'block';
                textInput.required = true;
                selectInput.style.display = 'none';
                selectInput.required = false;
                document.getElementById('ans_hint').innerText = "Type the exact correct answer.";
            }
        }

        // Sync selective value to main correct_answer name before submit
        document.querySelector('form').onsubmit = function () {
            const type = document.getElementById('q_type').value;
            if (type === 'mcq' || type === 'image') {
                const sel = document.getElementById('correct_answer_select');
                const optIdx = sel.selectedIndex; // 1-based since first is placeholder
                if (optIdx > 0) {
                    const optVal = document.getElementById('opt' + optIdx).value;
                    document.getElementById('correct_answer_text').value = optVal;
                }
            }
        };

        // Initial run
        window.onload = toggleFields;
    </script>
</body>

</html>
