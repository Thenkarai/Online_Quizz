<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz - QuizPro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body>
    <div class="container" style="max-width: 600px;">
        <div class="card">
            <h2>Create New Quiz</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Quiz Title</label>
                    <input type="text" name="title" placeholder="E.g. Engineering Mock Quiz" required>
                </div>
                <div class="form-group">
                    <label>Duration (Minutes)</label>
                    <input type="number" name="duration" value="30" required>
                </div>
                <div class="form-group">
                    <label>Number of Questions</label>
                    <input type="number" name="num_questions" value="10" required>
                </div>
                <div class="form-group">
                    <label>Time per Question (Seconds)</label>
                    <input type="number" name="time_per_question" value="30" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Generate Quiz Code & Proceed</button>
            </form>
        </div>
    </div>
</body>

</html>
